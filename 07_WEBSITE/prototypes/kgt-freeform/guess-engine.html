<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Guess The Engine - Korea Grand Tour 2026</title>
  <meta name="description" content="A small petrolhead engine-sound guessing game for Korea Grand Tour.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="noise" aria-hidden="true"></div>
  <canvas id="motion-field" aria-hidden="true"></canvas>
  <header class="site-nav">
    <a class="brand" href="index.html" aria-label="Korea Grand Tour home"><img src="assets/kgt-logo.jpg" alt="Korea Grand Tour logo"><span>Korea Grand Tour</span></a>
    <nav aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="route.html">Route</a>
      <a href="rides.html">Rides</a>
      <a aria-current="page" href="guess-engine.html">Sound Game</a>
      <a href="join.html">Join</a>
    </nav>
    <a class="nav-cta" href="https://forms.gle/jyBn35kFik2hA5679" target="_blank" rel="noopener">Register</a>
  </header>

  <main>
    <section class="game-hero">
      <video class="hero-video" src="assets/hero-car-action.mp4" autoplay muted loop playsinline poster="assets/kgt2026-car-night.jpeg"></video>
      <div class="hero-shade" aria-hidden="true"></div>
      <div class="game-shell" data-engine-game>
        <div class="game-intro">
          <p class="eyebrow">Engine ear test</p>
          <h1>Guess the engine.</h1>
          <p>Hit play, listen to the rev, then choose the car character. No fake trivia wall. Just ears, throttle, and instinct.</p>
        </div>
        <div class="engine-game-card">
          <div class="game-meter">
            <span>Sample <strong data-round>1</strong> / 5</span>
            <div class="wave-bars" aria-hidden="true">
              <i></i><i></i><i></i><i></i><i></i><i></i><i></i>
            </div>
            <strong data-score>0 correct</strong>
          </div>
          <button class="engine-play" type="button" data-play-sample>Play engine sound</button>
          <div class="engine-options" data-options></div>
          <p class="game-feedback" data-feedback>Listen first. Then trust your ear.</p>
          <button class="button primary" type="button" data-next-sample>Next sound</button>
        </div>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
