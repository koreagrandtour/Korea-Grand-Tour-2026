<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Korea Grand Tour 2026 - One Road</title>
  <style>
    :root {
      --ink: #0B1017;
      --white: #F8F8F5;
      --blue: #0057B8;
      --orange: #FF6A00;
      --road: #2B3037;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--ink); font-family: Arial, Helvetica, sans-serif; }
    [data-composition-id="kgt-one-road"] {
      position: relative;
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      color: var(--white);
      background:
        radial-gradient(circle at 72% 18%, rgba(255, 106, 0, .28), transparent 24%),
        linear-gradient(180deg, #17344F 0%, #516449 45%, #121820 100%);
    }
    .scene {
      position: absolute;
      inset: 0;
      padding: 150px 92px 132px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 28px;
    }
    .headline {
      max-width: 830px;
      font-size: 118px;
      line-height: .96;
      font-weight: 800;
      letter-spacing: 0;
      text-shadow: 0 10px 38px rgba(0,0,0,.45);
    }
    .tag {
      width: 180px;
      height: 10px;
      background: linear-gradient(90deg, var(--blue) 68%, var(--orange) 68%);
      border-radius: 5px;
    }
    .road {
      position: absolute;
      right: -170px;
      bottom: -90px;
      width: 1180px;
      height: 870px;
      border-top: 118px solid rgba(43,48,55,.96);
      border-left: 54px solid transparent;
      border-radius: 62% 0 0 0;
      transform: rotate(-18deg);
      filter: drop-shadow(0 -34px 70px rgba(0,0,0,.28));
    }
    .lane {
      position: absolute;
      right: 148px;
      bottom: 410px;
      width: 470px;
      height: 9px;
      background: rgba(248,248,245,.78);
      transform: rotate(-18deg);
      border-radius: 9px;
    }
    .car {
      position: absolute;
      width: 126px;
      height: 48px;
      border-radius: 34px 34px 12px 12px;
      background: var(--white);
      box-shadow: 0 18px 32px rgba(0,0,0,.34);
    }
    .car::before {
      content: "";
      position: absolute;
      left: 29px;
      top: 7px;
      width: 68px;
      height: 17px;
      border-radius: 18px;
      background: rgba(11,16,23,.42);
    }
    .car.orange { background: var(--orange); }
    .car.blue { background: var(--blue); }
    .car.dark { background: #15191F; }
    #car1 { right: 138px; bottom: 260px; transform: rotate(-16deg); }
    #car2 { right: 300px; bottom: 374px; transform: rotate(-16deg) scale(.84); }
    #car3 { right: 478px; bottom: 495px; transform: rotate(-16deg) scale(.72); }
    #car4 { right: 642px; bottom: 602px; transform: rotate(-16deg) scale(.62); }
  </style>
</head>
<body>
  <div data-composition-id="kgt-one-road" data-width="1080" data-height="1920" data-duration="15">
    <div class="road"></div>
    <div class="lane"></div>
    <div id="car1" class="car"></div>
    <div id="car2" class="car orange"></div>
    <div id="car3" class="car blue"></div>
    <div id="car4" class="car dark"></div>
    <section class="scene">
      <div class="tag"></div>
      <div class="headline" id="headline">One road.</div>
    </section>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });
    tl.from(".tag", { y: 35, opacity: 0, duration: .45, ease: "power3.out" }, 0);
    tl.from("#headline", { y: 60, opacity: 0, duration: .55, ease: "power3.out" }, .1);
    tl.from(".car", { x: 260, y: 120, opacity: 0, stagger: .08, duration: .85, ease: "power3.out" }, .2);
    tl.to("#headline", { opacity: 0, y: -22, duration: .22 }, 2.85);
    tl.set("#headline", { textContent: "Four days across Korea.", y: 44 }, 3.05);
    tl.to("#headline", { opacity: 1, y: 0, duration: .35 }, 3.1);
    tl.to("#headline", { opacity: 0, y: -22, duration: .22 }, 6.75);
    tl.set("#headline", { textContent: "Cars, friends, memories.", y: 44 }, 7);
    tl.to("#headline", { opacity: 1, y: 0, duration: .35 }, 7.05);
    tl.to("#headline", { opacity: 0, y: -22, duration: .22 }, 11.75);
    tl.set("#headline", { textContent: "Korea Grand Tour 2026", y: 44 }, 12);
    tl.to("#headline", { opacity: 1, y: 0, duration: .35 }, 12.05);
    tl.to(".car", { x: -260, y: -140, duration: 15, ease: "none" }, 0);
    tl.to(".road,.lane", { x: -90, y: 38, duration: 15, ease: "none" }, 0);
    window.__timelines["kgt-one-road"] = tl;
  </script>
</body>
</html>
